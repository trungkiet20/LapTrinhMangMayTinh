name: Deploy to Server

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/laptrinhmangmaytinh:latest

      # Gọi Webhook từ ithutech để khởi chạy ứng dụng
      # Nếu trang web ithutech tự sinh cho bạn một đoạn cấu hình khác, hãy ghi đè đoạn này nhé!
      - name: Trigger Webhook Deploy
        run: |
          curl -X POST -k "${{ secrets.DEPLOY_URL }}"
